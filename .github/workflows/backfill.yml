name: OpenSpese — Backfill Storico

# Solo manuale: dalla tab Actions → "Run workflow".
# Rilancialo più volte finché il log non dice "Archivio esaurito".
on:
  workflow_dispatch:
    inputs:
      max_atti:
        description: 'Massimo atti da elaborare in questo run'
        required: false
        default: '300'
      anno_min:
        description: 'Anno minimo (non elaborare atti precedenti)'
        required: false
        default: '2016'
      solo_censimento:
        description: 'Solo censimento archivio (nessuna elaborazione)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: openspese-run
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 340

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa Tesseract e Poppler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ita poppler-utils

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze Python
        run: pip install -r requirements.txt

      - name: Esegui backfill
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          FLAGS="--max-atti ${{ inputs.max_atti }} --anno-min ${{ inputs.anno_min }}"
          if [ "${{ inputs.solo_censimento }}" = "true" ]; then
            FLAGS="$FLAGS --solo-censimento"
          fi
          python scripts/backfill.py $FLAGS

      - name: Aggiorna dati del sito
        run: python scripts/genera_sito.py

      - name: Salva risultati nel repository
        run: |
          git config user.name "OpenSpeseBot"
          git config user.email "bot@openspese.local"
          git pull --rebase --autostash
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Backfill storico: $(date '+%Y-%m-%d %H:%M')"
          git push
